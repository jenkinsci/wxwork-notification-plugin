<div>
  消息内容，支持 Jenkins 内置环境变量，常用变量如下：
  <ul>
    <li><code>${JOB_NAME}</code> — 项目名称</li>
    <li><code>${BUILD_NUMBER}</code> — 构建编号</li>
    <li><code>${BUILD_URL}</code> — 构建详情链接</li>
    <li><code>${BUILD_STATUS}</code> — 构建状态</li>
    <li><code>${GIT_BRANCH}</code> — Git 分支（需 Git 插件）</li>
    <li><code>${GIT_COMMIT}</code> — Git 提交 SHA（需 Git 插件）</li>
  </ul>
  Markdown/Markdown_v2 类型时，内容支持相应格式语法。
</div>
